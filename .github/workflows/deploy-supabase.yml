name: Deploy to Supabase

on:
  workflow_dispatch:

env:
  PROJECT_REF: tbwjwtctdvssilsxlbod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. Install Supabase CLI ──────────────────────────────────────────────
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── 2. Run migration via direct Postgres connection ──────────────────────
      # api.supabase.com/database/query is blocked by Cloudflare from GitHub
      # Actions IPs (error 1010). psql connects on port 5432 directly, bypassing
      # Cloudflare entirely.
      - name: Run database migration
        run: |
          PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql \
            -h "db.${PROJECT_REF}.supabase.co" \
            -U postgres \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f supabase/migrations/20260623000001_initial_schema.sql
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # ── 3. Deploy edge function via CLI ─────────────────────────────────────
      - name: Deploy ingest edge function
        run: |
          supabase functions deploy ingest \
            --project-ref $PROJECT_REF \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
